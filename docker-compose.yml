services:
  db:
    image: postgres:16-alpine
    container_name: templateallflix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: templatehouse
      POSTGRES_USER: templatehouse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-th_secret_2026}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    container_name: templateallflix-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio
    container_name: templateallflix-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: templateallflix
      MINIO_ROOT_PASSWORD: minio_secret_2026
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  db-data:
  redis-data:
  minio-data:
